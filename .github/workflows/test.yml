name: 1. Run Tests

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'prisma*.config.ts'
      - 'data/prisma/**'
      - '.github/workflows/test.yml'
  push:
    branches: [develop, main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package*.json'
      - 'prisma*.config.ts'
      - 'data/prisma/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --config prisma-auth.config.ts

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run test coverage
        run: npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: Tests completed
        run: |
          echo "All tests passed successfully!"
          echo "Next step: Build & Push Docker Image will start automatically"
