name: CI/CD Pipeline

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
      has_deployable: ${{ steps.matrix.outputs.has_deployable }}
    steps:
      - uses: actions/checkout@v4

      - name: Path filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            shared:
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci-cd.yml'
            core:
              - 'core/**'
            agent:
              - 'agent/**'
            database:
              - 'database/**'

      - name: Build deployment matrix
        id: matrix
        run: |
          DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          SHARED="${{ steps.filter.outputs.shared }}"
          MATRIX="[]"

          should_build() {
            [[ "$DISPATCH" == "true" || "$SHARED" == "true" || "$1" == "true" ]]
          }

          if should_build "${{ steps.filter.outputs.core }}"; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"service":"core","dockerfile":"core/Dockerfile","context":"."}]')
          fi
          if should_build "${{ steps.filter.outputs.agent }}"; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"service":"agent","dockerfile":"agent/Dockerfile","context":"."}]')
          fi
          if should_build "${{ steps.filter.outputs.database }}"; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"service":"database","dockerfile":"database/Dockerfile","context":"."}]')
          fi

          if [[ "$MATRIX" == "[]" ]]; then
            echo "has_deployable=false" >> "$GITHUB_OUTPUT"
            echo 'services={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "has_deployable=true" >> "$GITHUB_OUTPUT"
            echo "services={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          fi

  push-ghcr:
    name: "GHCR: ${{ matrix.service }}"
    needs: [changes]
    if: needs.changes.outputs.has_deployable == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.services) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.service }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false
          sbom: false
