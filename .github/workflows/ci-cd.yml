name: CI/CD Pipeline

on:
  push:
    branches: [develop]
    paths:
      - "src/**"
      - "test/**"
      - "package*.json"
      - "prisma*.config.ts"
      - "data/prisma/**"
      - "Dockerfile"
      - ".github/workflows/ci-cd.yml"
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: |
          npx prisma generate
          npx prisma generate --config prisma-auth.config.ts

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run test coverage
        run: npm run test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: success()
        with:
          files: ./coverage/lcov.info
          flags: backend
          name: backend-coverage
        continue-on-error: true

      - name: Tests completed
        run: |
          echo "All tests passed successfully!"
          echo "Next: Building Docker image..."

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      short-sha: ${{ steps.vars.outputs.short-sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up variables
        id: vars
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short-sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=latest" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.tag }}
            type=raw,value=${{ steps.vars.outputs.short-sha }}
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

      - name: Image digest
        run: |
          echo "Image pushed successfully with tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Short SHA: ${{ steps.vars.outputs.short-sha }}"
          echo "Next: Deploying to AWS ECS..."

  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [test, build]
    # Only run if build succeeded
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Determine image tag
        id: image-tag
        run: |
          TAG=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Deploying image tag: ${TAG}"

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION_FAMILY }} \
            --query taskDefinition > task-definition.json

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY_NAME }}:${{ steps.image-tag.outputs.tag }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE_NAME }}
          cluster: ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Verify deployment
        run: |
          echo "Deployment completed successfully!"
          echo "Service: ${{ secrets.ECS_SERVICE_NAME }}"
          echo "Cluster: ${{ secrets.ECS_CLUSTER_NAME }}"
          echo "Image tag: ${{ steps.image-tag.outputs.tag }}"
          echo "Branch: ${{ github.ref }}"

      - name: Get service status
        run: |
          echo "Service Status:"
          aws ecs describe-services \
            --cluster ${{ secrets.ECS_CLUSTER_NAME }} \
            --services ${{ secrets.ECS_SERVICE_NAME }} \
            --query 'services[0].[serviceName,status,runningCount,desiredCount]' \
            --output table

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name: Check pipeline status
        run: |
          echo "CI/CD Pipeline Summary"
          echo "========================="
          echo "Test:   ${{ needs.test.result }}"
          echo "Build:  ${{ needs.build.result }}"
          echo "Deploy: ${{ needs.deploy.result }}"
          echo ""

          if [[ "${{ needs.test.result }}" == "failure" ]]; then
            echo "Tests failed - pipeline stopped"
            exit 1
          elif [[ "${{ needs.build.result }}" == "failure" ]]; then
            echo "Build failed - deployment skipped"
            exit 1
          elif [[ "${{ needs.deploy.result }}" == "failure" ]]; then
            echo "Deployment failed"
            exit 1
          elif [[ "${{ needs.deploy.result }}" == "skipped" ]]; then
            echo "Deployment was skipped (PR or non-develop branch)"
          else
            echo "All pipeline stages completed successfully!"
          fi
