worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile          on;
    keepalive_timeout 65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format gateway '$remote_addr -> $upstream_addr "$request" $status';
    access_log /var/log/nginx/access.log gateway;

    upstream core_service {
        server core:3000;
    }
    upstream agent_service {
        server agent:3001;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 2m;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        location /auth/ {
            proxy_pass http://core_service;
            include /etc/nginx/proxy_common.conf;
        }

        location /admin/ {
            proxy_pass http://core_service;
            include /etc/nginx/proxy_common.conf;
        }

        location /agent/ {
            proxy_pass http://agent_service;
            include /etc/nginx/proxy_common.conf;
        }


        location /socket.io/ {
            proxy_pass http://agent_service;
            include /etc/nginx/proxy_common.conf;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /health {
            access_log off;
            default_type text/plain;
            return 200 'gateway ok\n';
        }

        location / {
            return 404;
        }
    }
}
