services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nl2sql
      POSTGRES_PASSWORD: nl2sql
      POSTGRES_DB: nl2sql
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  auth-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB: auth
    ports:
      - '5433:5432'
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  redisDB:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
      - auth-db
      - redisDB
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nl2sql:nl2sql@db:5432/nl2sql?schema=public}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://auth:auth@auth-db:5432/auth?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redisDB:6379}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:5173}

volumes:
  pgdata:
  pgdata-auth:
  redisdata:
