services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nl2sql
      POSTGRES_PASSWORD: nl2sql
      POSTGRES_DB: nl2sql
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://nl2sql:nl2sql@db:5432/nl2sql?schema=public

volumes:
  pgdata:
