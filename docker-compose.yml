services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://nl2sql:nl2sql@db:5432/nl2sql?schema=public}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:-postgresql://auth:auth@auth-db:5432/auth?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:5173}

volumes: {}
